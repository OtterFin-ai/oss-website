<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ if .IsHome }}OtterFin — Family Finance, Together{{ else }}{{ .Title }} · OtterFin{{ end }}</title>
  <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}Self-hosted, open-source personal and family finance. Account-based transaction ledger, multi-currency, multi-user households. Deploy with Docker in minutes.{{ end }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/otterfin.css">
</head>
<body>

  <!-- Nav -->
  <nav class="nav">
    <div class="container nav__inner">
      <a href="/" class="nav__logo">
        <img src="/logo.svg" alt="OtterFin logo">
        OtterFin
      </a>

      <ul class="nav__links">
        <li><a href="/#features">Features</a></li>
        <li><a href="/#multicurrency">Multi-Currency</a></li>
        <li><a href="/#import">Import</a></li>
        <li><a href="/#quickstart">Get Started</a></li>
        <li><a href="https://github.com/OtterFin-ai/otterfin/wiki" target="_blank">Docs</a></li>
        <li><a href="/updates"{{ if eq .Section "updates" }} class="nav__link--active"{{ end }}>Updates</a></li>
      </ul>

      <div class="nav__cta">
        <a href="https://github.com/OtterFin-ai/otterfin" target="_blank" class="nav__github">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/></svg>
          Star on GitHub
        </a>
      </div>

      <button class="nav__mobile-toggle" aria-label="Toggle menu" onclick="document.querySelector('.nav__links').classList.toggle('nav__links--open')">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
      </button>
    </div>
  </nav>

  {{ block "main" . }}{{ end }}

  <!-- Footer -->
  <footer class="footer">
    <div class="container footer__inner">
      <div class="footer__left">
        <img src="/logo.svg" alt="OtterFin logo">
        OtterFin &middot; Open source under AGPLv3 &middot; Docs licensed under CC BY-SA 4.0
      </div>
      <div class="footer__right">
        <a href="https://github.com/OtterFin-ai/otterfin" target="_blank">GitHub</a>
        <a href="https://discord.gg/JuQNMMqpTD" target="_blank">Discord</a>
        <a href="https://github.com/OtterFin-ai/otterfin/wiki" target="_blank">Docs</a>
      </div>
    </div>
  </footer>

  <script>
    const nav = document.querySelector('.nav');
    window.addEventListener('scroll', () => {
      nav.style.borderBottomColor = window.scrollY > 10 ? 'rgba(0,0,0,0.08)' : 'rgba(0,0,0,0.06)';
    });
  </script>
</body>
</html>
